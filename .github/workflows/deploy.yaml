name: Deploy Spring Boot App via FTP

on:
  push:
    branches:
      - main   # or 'develop'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Zip JAR
        run: zip app.zip target/*.jar

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.4.0
        with:
          server: waws-prod-pn1-003.ftp.azurewebsites.windows.net  # from your publish profile
          username: ${{ secrets.AZURE_FTP_USERNAME }}
          password: ${{ secrets.AZURE_FTP_PASSWORD }}
          local-dir: ./app.zip
          remote-dir: /site/wwwroot